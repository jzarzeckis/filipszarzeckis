name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript
        run: bunx tsc --noEmit

      - name: Tests
        run: bun test

      - name: Build
        run: bun build src/index.html --outdir dist
